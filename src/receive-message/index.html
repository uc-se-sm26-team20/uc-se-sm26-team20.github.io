<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simple Messenger UI</title>

<style>
#chat-box {
    width: 500px;
    height: 300px;
    border: 1px solid black;
    overflow-y: auto;
    padding: 10px;
    margin-bottom: 10px;
}

.sent {
    color: blue;
    margin: 5px 0;
}

.received {
    color: green;
    margin: 5px 0;
}
</style>
</head>
<body>

<h1>Simple Messenger — V0.0</h1>
<h3>By Will Ruesink</h3>

<h4>Chat Box:</h4>
<div id="chat-box"></div>

Chat message:
<input id="chat-message"
       type="text"
       placeholder="Type a message..."
       style="width:450px;" />

<button id="send-button" onclick="sendMessage()">Send</button>

<button onclick="receiveMessage('Hello')">
    Simulate Receive
</button>

<script src="client.js"></script>

</body>
</html>
