<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Team 20 Messenger</title>

  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 25px;
    }

    .message-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .group-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid #ccc;
    }

    .group-tab {
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-bottom: none;
      background-color: #f5f5f5;
      cursor: pointer;
    }

    .group-tab.active {
      background-color: #ffffff;
      font-weight: bold;
    }

    .group-management {
      margin-bottom: 25px;
      padding: 12px;
      border: 1px solid #ccc;
      background-color: #fafafa;
    }

    .group-management-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #group-account-name {
      flex: 1;
      min-width: 180px;
      padding: 8px;
    }

    .group-management button {
      padding: 8px 12px;
      cursor: pointer;
    }

    #group-update-message {
      margin-top: 8px;
      min-height: 20px;
    }

    #my-groups {
      margin-bottom: 20px;
      font-weight: bold;
    }

    #chat-message {
      flex: 1;
      min-width: 0;
      padding: 10px;
      font-size: 16px;
    }

    #send-button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .login-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .hidden {
      display: none !important;
    }

    .message-area {
      width: 100%;
      height: 130px;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 20px;
      overflow-y: auto;
      border: 1px solid #777;
      background-color: #ffffff;
    }

    #status {
      background-color: #f5f5f5;
    }

    .message-time {
      color: #2431e5;
      font-weight: bold;
    }

    .status-time {
      color: #168216;
      font-weight: bold;
    }

    #typing-indicator {
      height: 20px;
      margin-bottom: 15px;
      font-style: italic;
      color: #666;
    }
  </style>
</head>

<body>
  <h1>Team 20 Messenger</h1>

  <p class="subtitle">
    EECE/CS 3093C Software Engineering — Summer 2026
  </p>

  <div id="login-screen" class="login-container">
    <label for="username">Enter your username to join:</label>

    <input
      id="username"
      type="text"
      placeholder="Username..."
      style="padding: 10px; font-size: 16px;"
    >

    <button
      id="join-button"
      type="button"
      style="padding: 10px; font-size: 16px; cursor: pointer;"
    >
      Join Chat
    </button>
  </div>

  <div id="main-chat" class="hidden">
    <div
      class="group-tabs"
      role="tablist"
      aria-label="User groups"
    >
      <button
        class="group-tab active"
        type="button"
        role="tab"
        aria-selected="true"
      >
        Neighborhood
      </button>

      <button
        class="group-tab"
        type="button"
        role="tab"
        aria-selected="false"
      >
        Local Government
      </button>

      <button
        class="group-tab"
        type="button"
        role="tab"
        aria-selected="false"
      >
        Events
      </button>
    </div>

    <div
      id="my-groups"
      aria-live="polite"
    >
      My group chats: none
    </div>

    <div class="group-management">
      <label for="group-account-name">
        Organizer group management
      </label>

      <div class="group-management-controls">
        <input
          id="group-account-name"
          type="text"
          placeholder="Username"
          aria-label="Username to update"
        >

        <button
          id="add-user-group-button"
          type="button"
        >
          Add Selected Group
        </button>

        <button
          id="delete-user-group-button"
          type="button"
        >
          Delete Selected Group
        </button>
      </div>

      <div
        id="group-update-message"
        aria-live="polite"
      ></div>
    </div>

    <div class="message-controls">
      <input
        id="chat-message"
        type="text"
        maxlength="500"
        autocomplete="off"
        placeholder="Type a message..."
        aria-label="Chat message"
      >

      <button
        id="send-button"
        type="button"
      >
        Send
      </button>
    </div>

    <div id="typing-indicator"></div>

    <h2>System Status</h2>

    <div
      id="status"
      class="message-area"
      aria-live="polite"
    ></div>

    <h2>Chat Responses</h2>

    <div
      id="responses"
      class="message-area"
      aria-live="polite"
    ></div>
  </div>

  <!-- Socket.IO client library supplied by the Node.js server. -->
  <script src="/socket.io/socket.io.js"></script>

  <!--
    DOMPurify sanitizes displayed messages to help prevent
    Cross-Site Scripting attacks.
  -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"
    integrity="sha512-78KH17QLT5e55GJqP76vutp1D2iAoy06WcYBXB6iBCsmO6wWzx0Qdg8EDpm8mKXv68BcvHOyeeP4wxAL0twJGQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>

  <!-- Team 20 messenger client implementation. -->
  <script src="client.js"></script>
</body>
</html>
