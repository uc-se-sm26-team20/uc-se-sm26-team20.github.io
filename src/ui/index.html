<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simple Messenger UI</title>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h1>Public Chat — V1.1</h1>
<h3>By Team 20</h3>

<br>
Chat message:  
<input id="chat-message" type="text" autocomplete="off" placeholder="Type a message…" style="width:450px;" />  
<button id="send-button">Send</button>
<br>
<b>System status: </b><br>
<div id="status" style="width:625px; height:75px; overflow-y:scroll;"></div>
<b>Chat Responses:</b><br>
<div id="responses"></div>
<script src="client.js"></script>
</body>
</html>
