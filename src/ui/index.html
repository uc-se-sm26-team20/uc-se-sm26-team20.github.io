<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Team 20 Messenger</title>

  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 25px;
    }

    .message-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    #chat-message {
      flex: 1;
      min-width: 0;
      padding: 10px;
      font-size: 16px;
    }

    #send-button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .message-area {
      width: 100%;
      height: 130px;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 20px;
      overflow-y: auto;
      border: 1px solid #777;
      background-color: #ffffff;
    }

    #status {
      background-color: #f5f5f5;
    }

    .message-time {
      color: #2431e5;
      font-weight: bold;
    }

    .status-time {
      color: #168216;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Team 20 Messenger</h1>

  <p class="subtitle">
    EECE/CS 3093C Software Engineering — Summer 2026
  </p>

  <div class="message-controls">
    <input
      id="chat-message"
      type="text"
      maxlength="500"
      autocomplete="off"
      placeholder="Type a message..."
      aria-label="Chat message"
    >

    <button
      id="send-button"
      type="button"
    >
      Send
    </button>
  </div>

  <h2>System Status</h2>

  <div
    id="status"
    class="message-area"
    aria-live="polite"
  ></div>

  <h2>Chat Responses</h2>

  <div
    id="responses"
    class="message-area"
    aria-live="polite"
  ></div>

  <!-- Socket.IO client library supplied by the Node.js server. -->
  <script src="/socket.io/socket.io.js"></script>

  <!--
    DOMPurify sanitizes displayed messages to help prevent
    Cross-Site Scripting attacks.
  -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"
    integrity="sha512-78KH17QLT5e55GJqP76vutp1D2iAoy06WcYBXB6iBCsmO6wWzx0Qdg8EDpm8mKXv68BcvHOyeeP4wxAL0twJGQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>

  <!-- Team 20 messenger client implementation. -->
  <script src="client.js"></script>
</body>
</html>
